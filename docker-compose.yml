version: '3.8'

services:
  chatbot:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      PORT: 8000
      GROQ_API_KEY: ${GROQ_API_KEY}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:8000
    volumes:
      - ./backend:/app/backend
    command: bash -c "cd /app/backend && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Frontend development service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      VITE_API_URL: http://localhost:8000
    command: npm run dev
    profiles: ["dev"]

networks:
  default:
    name: chatbot-network
